services:
  - type: web
    name: earbud
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_REASONING_EFFORT
        value: minimal
      - key: ASSEMBLYAI_MAX_SPEAKERS
        value: "2"
      # Turn endpointing — tuned snappier than code defaults (0.8 / 1000 / 3000)
      # so the coach reacts faster. Keep in sync with local .env.
      - key: ASSEMBLYAI_EOT_CONFIDENCE
        value: "0.6"
      - key: ASSEMBLYAI_MIN_SILENCE
        value: "500"
      - key: ASSEMBLYAI_MAX_SILENCE
        value: "1600"
